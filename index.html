<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0F2027">
    <meta name="description" content="Create, manage, and export client-ready business proposals.">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Proposal Manager">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Proposal Manager</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="#/">
          <span class="brand-mark">PM</span>
          <span>
            <strong>Proposal Manager</strong>
          </span>
        </a>
        <div class="topbar-actions">
          <span class="cloud-status" id="cloudStatus">Local storage</span>
          <button class="icon-button" id="backupButton" type="button" title="Download JSON backup">Backup</button>
          <label class="icon-button import-button" title="Import JSON backup">
            Import
            <input id="importInput" type="file" accept="application/json,.json">
          </label>
        </div>
      </header>

      <main id="app" class="page" aria-live="polite"></main>
    </div>

    <template id="dashboardTemplate">
      <section class="panel controls-panel">
        <div class="field search-field">
          <label for="searchInput">Search</label>
          <input id="searchInput" type="search" placeholder="Search title, description, notes, or divisions">
        </div>
        <div class="field">
          <label>Status</label>
          <div id="statusFilterPanel" class="choice-panel choice-panel-inline" aria-label="Status filters"></div>
        </div>
        <div class="field">
          <label>Sort</label>
          <div id="sortPanel" class="choice-panel choice-panel-grid" aria-label="Sort proposals"></div>
        </div>
      </section>

      <section>
        <div class="section-heading">
          <h2>Proposals</h2>
          <span id="resultCount">0 shown</span>
        </div>
        <div id="proposalList" class="proposal-grid"></div>
        <div id="emptyState" class="empty-state" hidden>
          <h3>No proposals yet</h3>
          <p>Create your first proposal and it will appear here automatically.</p>
          <a class="primary-button" href="#/new">Create Proposal</a>
        </div>
      </section>

      <a class="fab" href="#/new" aria-label="Add Proposal">+</a>
    </template>

    <template id="formTemplate">
      <section class="panel form-panel">
        <form id="proposalForm">
          <div class="button-row page-actions">
            <button class="primary-button" type="submit">Save Proposal</button>
            <a class="secondary-button" href="#/">Cancel</a>
            <button class="danger-button" id="deleteFromForm" type="button" hidden>Delete</button>
          </div>
          <span id="autosaveState" class="autosave-pill visually-hidden" aria-live="polite">Autosave ready</span>

          <div class="form-grid">
            <div class="field full title-def-row">
              <div class="field">
                <label for="title">Name</label>
                <input id="title" name="title" type="text" placeholder="Website redesign proposal" required>
              </div>
              <div class="field def-field">
                <label>Def</label>
                <input id="defMode" name="defMode" type="hidden" value="off">
                <button class="date-switch def-switch" type="button" data-binary-switch="def" role="switch" aria-checked="false">
                  <span class="switch-track"><span class="switch-thumb"></span></span>
                  <span class="switch-copy" data-binary-switch-label>Off</span>
                </button>
              </div>
            </div>
            <div class="field meta-field">
              <label for="status">Status</label>
              <select id="status" name="status">
                <option>Pending</option>
                <option>Completed</option>
                <option>For information only</option>
              </select>
            </div>
            <div class="field meta-field date-choice-field">
              <label>Deadline</label>
              <input id="deadlineMode" name="deadlineMode" type="hidden" value="none">
              <button class="date-switch" type="button" data-date-switch="deadline" role="switch" aria-checked="false">
                <span class="switch-track"><span class="switch-thumb"></span></span>
                <span class="switch-copy" data-date-switch-label>No date</span>
              </button>
              <input id="deadline" name="deadline" type="date" class="date-picker-proxy">
            </div>
            <div class="field meta-field date-choice-field">
              <label>Proposal Date</label>
              <input id="timelineDateMode" name="timelineDateMode" type="hidden" value="none">
              <button class="date-switch" type="button" data-date-switch="timelineDate" role="switch" aria-checked="false">
                <span class="switch-track"><span class="switch-thumb"></span></span>
                <span class="switch-copy" data-date-switch-label>No date</span>
              </button>
              <input id="timelineDate" name="timelineDate" type="date" class="date-picker-proxy">
            </div>
            <div class="field full">
              <label>Divisions Table</label>
              <div class="table-editor">
                <div class="detail-division-controls">
                  <div id="formDivisionPanel" class="choice-panel choice-panel-divisions" aria-label="Select divisions"></div>
                  <div class="division-action-row">
                    <button class="secondary-button compact-button" id="editFormDivisionsButton" type="button">Edit Divisions</button>
                    <button class="secondary-button compact-button" id="importDivisionJsonButton" type="button">Import JSON</button>
                  </div>
                </div>
                <div class="division-table-wrap">
                  <table class="division-table" aria-label="Proposal divisions">
                    <thead>
                      <tr>
                        <th>Divisions</th>
                        <th>Comments</th>
                        <th>Additional Comments</th>
                        <th>Countries</th>
                      </tr>
                    </thead>
                    <tbody id="divisionRows"></tbody>
                  </table>
                </div>
                <p id="formDivisionEmpty" class="hint" hidden>Select divisions above to add them to the table.</p>
              </div>
            </div>
            <div class="field upload-field">
              <label for="ocrUpload">OCR Upload (optional)</label>
              <input id="ocrUpload" type="file" accept="image/*" multiple>
            </div>
            <div class="field upload-field">
              <label for="cameraCapture">Camera Capture (optional)</label>
              <input id="cameraCapture" type="file" accept="image/*" capture="environment">
            </div>
            <div class="field full">
              <label>Saved Images</label>
              <div class="image-preview-grid" id="imagePreview" hidden></div>
              <button class="danger-button" id="removeImageButton" type="button" hidden>Remove Images</button>
            </div>
            <div class="field full">
              <label for="notes">Notes</label>
              <textarea id="notes" name="notes" rows="4" placeholder="Internal notes, assumptions, next steps, or reminders."></textarea>
            </div>
            <div class="field full">
              <label for="description">OCR Extracted Text</label>
              <textarea id="description" name="description" rows="6" placeholder="Extracted text will appear here after OCR."></textarea>
            </div>
          </div>
        </form>
      </section>

      <div class="modal-backdrop" id="formDivisionModal" hidden>
        <section class="panel modal-panel" role="dialog" aria-modal="true" aria-labelledby="formDivisionModalTitle">
          <div class="modal-header">
            <div>
              <p class="eyebrow">Manage options</p>
              <h2 id="formDivisionModalTitle">Edit Divisions</h2>
            </div>
            <button class="icon-button compact-button" id="closeFormDivisionModal" type="button">Close</button>
          </div>
          <div class="modal-body">
            <div id="formDivisionOptionList" class="division-option-editor"></div>
            <div class="division-option-add">
              <input id="formNewDivisionInput" type="text" placeholder="Add new division">
              <button class="secondary-button compact-button" id="addFormDivisionOption" type="button">Add</button>
            </div>
          </div>
          <div class="button-row">
            <button class="primary-button" id="saveFormDivisionOptions" type="button">Save Changes</button>
            <button class="secondary-button" id="cancelFormDivisionModal" type="button">Cancel</button>
          </div>
        </section>
      </div>

      <div class="modal-backdrop" id="divisionJsonModal" hidden>
        <section class="panel modal-panel" role="dialog" aria-modal="true" aria-labelledby="divisionJsonModalTitle">
          <div class="modal-header">
            <div>
              <p class="eyebrow">Populate table</p>
              <h2 id="divisionJsonModalTitle">Import Division JSON</h2>
            </div>
            <button class="icon-button compact-button" id="closeDivisionJsonModal" type="button">Close</button>
          </div>
          <div class="modal-body">
            <div class="field">
              <label for="divisionJsonInput">JSON text</label>
              <textarea id="divisionJsonInput" rows="14" placeholder='{"AMS":["Canada","USA"]}'></textarea>
              <small class="hint">Best format: object keyed by division with an array of countries. Both JSON formats are accepted.</small>
            </div>
          </div>
          <div class="button-row">
            <button class="primary-button" id="applyDivisionJsonButton" type="button">Fill Table</button>
            <button class="secondary-button" id="cancelDivisionJsonModal" type="button">Cancel</button>
          </div>
        </section>
      </div>
    </template>

    <template id="detailTemplate">
      <nav class="detail-actions page-actions">
        <a class="secondary-button" href="#/">Back</a>
        <a class="primary-button" id="editDetailButton" href="#">Edit</a>
        <button class="secondary-button" id="pdfButton" type="button">Export</button>
        <button class="danger-button" id="deleteDetailButton" type="button">Delete</button>
      </nav>

      <article class="proposal-document" id="proposalDocument">
        <header class="document-header">
          <h1 id="detailTitle"></h1>
          <div class="document-header-meta" aria-label="Proposal metadata">
            <div class="document-field">
              <span>Status</span>
              <p id="detailStatus"></p>
            </div>
            <div class="document-field">
              <span>Deadline</span>
              <p id="detailDeadline"></p>
            </div>
            <div class="document-field">
              <span>Proposal Date</span>
              <p id="detailDate"></p>
            </div>
            <div class="document-field">
              <span>Def</span>
              <p id="detailDef"></p>
            </div>
          </div>
        </header>

        <section id="detailTableSection" hidden>
          <h3>Divisions</h3>
          <div class="division-row-list" id="detailDivisionRows"></div>
          <p id="detailDivisionEmpty" class="hint" hidden>No divisions selected.</p>
        </section>

        <section id="detailImageSection" hidden>
          <h3>Saved Images</h3>
          <div id="detailImages" class="document-image-grid"></div>
        </section>

        <section id="detailNotesSection" hidden>
          <h3>Notes</h3>
          <p id="detailNotes"></p>
        </section>

        <section>
          <h3>OCR Extracted Text</h3>
          <p id="detailDescription"></p>
        </section>
      </article>

      <div class="modal-backdrop detail-preview-backdrop" id="detailPreviewModal" hidden>
        <section class="panel modal-panel detail-preview-panel" role="dialog" aria-modal="true" aria-labelledby="detailPreviewTitle">
          <div class="modal-header">
            <h2 id="detailPreviewTitle"></h2>
            <button class="icon-button compact-button" id="closeDetailPreviewModal" type="button">Close</button>
          </div>
          <div class="detail-preview-body" id="detailPreviewBody"></div>
        </section>
      </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
